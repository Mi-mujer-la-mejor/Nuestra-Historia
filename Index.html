<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te amo Melannie ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at center, #0d1330, #000);
  font-family:'Pacifico', cursive;
}

/* TEXTO */
.texto{
  position:absolute;
  font-size:28px;
  color:#ff0000;
  text-shadow:0 0 10px #ff0000, 0 0 25px #ff4d4d, 0 0 40px #ff0000;
  animation: mover 10s ease-in-out infinite alternate;
  white-space:nowrap;
}

/* MOVIMIENTO */
@keyframes mover{
  0%{ top:10%; left:10%; }
  25%{ top:20%; left:60%; }
  50%{ top:60%; left:20%; }
  75%{ top:70%; left:55%; }
  100%{ top:30%; left:30%; }
}

/* CORAZONES */
.corazon{
  position:fixed;
  bottom:-20px;
  color:pink;
  animation: subir linear infinite;
  opacity:0.8;
}

@keyframes subir{
  0%{
    transform:translateY(0) scale(0.5);
    opacity:0;
  }
  30%{
    opacity:1;
  }
  100%{
    transform:translateY(-110vh) scale(1.2);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="texto">TE AMO <br>MELANNIE 
<br>:)</div>

<script>
function crearCorazon(){
  let c = document.createElement("div");
  c.className="corazon";
  c.innerHTML="❤";

  c.style.left=Math.random()*100+"vw";

  let size = 10 + Math.random()*25;
  c.style.fontSize = size + "px";

  c.style.animationDuration = (4 + Math.random()*4) + "s";

  c.style.opacity = Math.random();

  document.body.appendChild(c);

  setTimeout(()=>c.remove(),8000);
}

setInterval(crearCorazon,300);
</script>

</body>
</html>
