<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a0f0f">
<title>Nuestra Historia ♡</title>

<!-- ═══════════════════════════════════════════
     FUENTES — mismas que la página original
════════════════════════════════════════════ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,700&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   VARIABLES — paleta idéntica a la original
════════════════════════════════════════════ */
:root {
  --deep:   #1a0f0f;
  --smoke:  #241515;
  --wine:   #6b2d3a;
  --rose:   #c8847a;
  --petal:  #e8c4bb;
  --gold:   #c9a96e;
  --cream:  #f5f0e8;
  --muted:  rgba(245, 240, 232, 0.45);
  --glass:  rgba(245, 240, 232, 0.04);
  --border: rgba(200, 132, 122, 0.15);
}

/* ═══════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }
body {
  min-height: 100dvh;
  background: var(--deep);
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   FONDO — CAMBIA AQUÍ LA IMAGEN DE FONDO
   Reemplaza la URL dentro de url('...')
   por la imagen que quieras usar.
   El overlay oscuro está separado para que
   puedas ajustar la opacidad fácilmente.
════════════════════════════════════════════ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;

  /* ▼ CAMBIA ESTA URL por tu imagen de fondo */
  background-image: url('https://i.imgur.com/Sm2tgcX.png');
  background-size: cover;
  background-position: center;
  background-attachment: scroll;

  /* Leve zoom para efecto cinematográfico */
  transform: scale(1.04);
  animation: bgDrift 20s ease-in-out infinite alternate;
}
@keyframes bgDrift {
  from { transform: scale(1.04) translateX(0);   }
  to   { transform: scale(1.08) translateX(-1%); }
}

/* Overlay oscuro encima de la imagen
   Ajusta la opacidad (0.82) para más/menos oscuridad */
.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: linear-gradient(
    180deg,
    rgba(14, 7, 9, 0.88) 0%,
    rgba(26, 15, 15, 0.80) 40%,
    rgba(36, 21, 21, 0.88) 100%
  );
}

/* Partículas de ruido cinematográfico */
.bg-noise {
  position: fixed;
  inset: 0;
  z-index: 2;
  opacity: 0.025;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ═══════════════════════════════════════════
   WRAPPER PRINCIPAL
════════════════════════════════════════════ */
.page-wrapper {
  position: relative;
  z-index: 3;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 80px;
}

/* ═══════════════════════════════════════════
   HEADER — "Nuestra Historia ♡"
════════════════════════════════════════════ */
.header {
  width: 100%;
  text-align: center;
  padding: 64px 20px 20px;
}

.header-eyebrow {
  display: block;
  font-size: 8px;
  letter-spacing: 7px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.3s forwards;
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(36px, 11vw, 64px);
  color: var(--cream);
  line-height: 1.1;
  letter-spacing: -1px;
  opacity: 0;
  animation: fadeUp 1.1s ease 0.5s forwards;
}

.header-title .heart {
  color: var(--rose);
  font-style: normal;
  display: inline-block;
  animation: heartbeat 3s ease-in-out 1.8s infinite;
}

.header-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 28px auto 0;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.9s forwards;
}
.header-divider::before,
.header-divider::after {
  content: '';
  display: block;
  width: 48px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,132,122,0.4));
}
.header-divider::after {
  background: linear-gradient(to left, transparent, rgba(200,132,122,0.4));
}
.header-divider span {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0);    }
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1);    }
  15%       { transform: scale(1.18); }
  30%       { transform: scale(1);    }
  45%       { transform: scale(1.1);  }
  60%       { transform: scale(1);    }
}

/* ═══════════════════════════════════════════
   SUBTITLE BAJO EL HEADER
════════════════════════════════════════════ */
.header-sub {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  text-align: center;
  margin-top: 14px;
  opacity: 0;
  animation: fadeUp 0.8s ease 1.1s forwards;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
}

/* ═══════════════════════════════════════════
   LIBROS — GRID CONTAINER
════════════════════════════════════════════ */
.books-grid {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin-top: 48px;
  padding: 0 4px;
}

/* ═══════════════════════════════════════════
   LIBRO BASE — estilo diario/cuaderno
════════════════════════════════════════════ */
.book {
  position: relative;
  width: 100%;
  border-radius: 3px 12px 12px 3px; /* lomo izquierdo recto, resto redondeado */
  overflow: hidden;
  cursor: pointer;

  /* Sombra tipo libro físico */
  box-shadow:
    -6px 0  0   0   rgba(0,0,0,0.5),         /* lomo */
    -2px 0  0   0   rgba(200,132,122,0.15),   /* borde lomo dorado */
    0    8px 32px   rgba(0,0,0,0.5),           /* sombra suelo */
    0    2px  8px   rgba(0,0,0,0.3);

  /* Estado inicial para animación de entrada */
  opacity: 0;
  transform: translateY(36px);
  transition:
    transform  0.45s cubic-bezier(0.34, 1.26, 0.64, 1),
    box-shadow 0.35s ease,
    opacity    0.6s ease;
}

/* Cuando entra al viewport */
.book.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Touch/hover — leve elevación */
.book:active,
.book:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow:
    -6px 0  0   0   rgba(0,0,0,0.5),
    -2px 0  0   0   rgba(200,132,122,0.25),
    0   16px 48px   rgba(0,0,0,0.55),
    0    4px 16px   rgba(200,132,122,0.12);
}

/* IMAGEN DE PORTADA
   ▼ Cada libro tiene su propia clase para cambiar la imagen */
.book-cover {
  width: 100%;
  aspect-ratio: 4 / 5;    /* proporción tipo libro */
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease, filter 0.4s ease;
}
.book:hover .book-cover,
.book:active .book-cover {
  transform: scale(1.03);
}

/* Degradado sobre la imagen (siempre visible) */
.book-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    170deg,
    rgba(26,15,15,0.15) 0%,
    rgba(26,15,15,0.55) 55%,
    rgba(26,15,15,0.90) 100%
  );
  transition: background 0.4s ease;
}

/* Textura de lomo del libro */
.book-spine {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.6),
    rgba(200,132,122,0.1),
    transparent
  );
}

/* Contenido dentro de la portada */
.book-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 24px 22px 22px 26px;
}

.book-chapter {
  display: inline-block;
  font-size: 7px;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
  background: rgba(0,0,0,0.25);
  padding: 4px 8px;
  border-radius: 1px;
  align-self: flex-start;
  backdrop-filter: blur(4px);
}

.book-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(22px, 7vw, 30px);
  color: var(--cream);
  line-height: 1.15;
  margin-bottom: 10px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}

.book-sub {
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(245,240,232,0.5);
  text-transform: uppercase;
}

/* Esquina decorativa — detalle de cuaderno */
.book-corner {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 28px;
  height: 28px;
  border-top: 1px solid rgba(200,132,122,0.3);
  border-right: 1px solid rgba(200,132,122,0.3);
}

/* ═══════════════════════════════════════════
   LIBRO 1 — ACTIVO (redirige al link)
   ▼ CAMBIA: la imagen src en el HTML
   ▼ CAMBIA: el href del <a> en el HTML
════════════════════════════════════════════ */
.book-active .book-cover {
  filter: brightness(0.75) sepia(15%) contrast(1.05);
}
.book-active:hover .book-cover,
.book-active:active .book-cover {
  filter: brightness(0.85) sepia(8%) contrast(1.08);
}

/* Glow dorado sutil en el activo */
.book-active::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 3px 12px 12px 3px;
  border: 1px solid rgba(200,132,122,0.2);
  pointer-events: none;
}

/* Icono de flecha en libro activo */
.book-arrow {
  position: absolute;
  bottom: 22px;
  right: 20px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(200,132,122,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--rose);
  backdrop-filter: blur(8px);
  background: rgba(26,15,15,0.4);
  transition: transform 0.3s ease, background 0.3s;
}
.book-active:hover .book-arrow,
.book-active:active .book-arrow {
  transform: translateX(3px);
  background: rgba(200,132,122,0.12);
}

/* ═══════════════════════════════════════════
   LIBROS 2 y 3 — EN PROCESO (deshabilitados)
   ▼ Para activar: quita la clase .book-locked
     y añade .book-active + cambia imagen y link
════════════════════════════════════════════ */
.book-locked .book-cover {
  filter: brightness(0.35) sepia(40%) contrast(0.9) blur(1.5px);
}
.book-locked:hover .book-cover,
.book-locked:active .book-cover {
  filter: brightness(0.35) sepia(40%) contrast(0.9) blur(1.5px);
  transform: none; /* sin zoom en bloqueados */
}
.book-locked:hover,
.book-locked:active {
  transform: none;
  box-shadow:
    -6px 0  0   0   rgba(0,0,0,0.5),
    -2px 0  0   0   rgba(200,132,122,0.1),
    0    8px 32px   rgba(0,0,0,0.4);
  cursor: default;
}

/* Overlay "En proceso..." */
.book-locked-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(14,7,9,0.35);
  backdrop-filter: blur(2px);
}

.lock-icon {
  font-size: 28px;
  opacity: 0.5;
  animation: lockPulse 4s ease-in-out infinite;
}
@keyframes lockPulse {
  0%,100% { opacity: 0.35; transform: scale(1);    }
  50%      { opacity: 0.55; transform: scale(1.06); }
}

.lock-label {
  font-size: 8px;
  letter-spacing: 5px;
  color: rgba(245,240,232,0.35);
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════
   FOOTER — detalle elegante abajo
════════════════════════════════════════════ */
.page-footer {
  margin-top: 60px;
  text-align: center;
  opacity: 0;
  animation: fadeUp 0.8s ease 1.5s forwards;
}
.footer-sym {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 22px;
  color: rgba(200,132,122,0.25);
  display: block;
  margin-bottom: 12px;
  animation: float 5s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0);   }
  50%      { transform: translateY(-6px);}
}
.footer-note {
  font-size: 7px;
  letter-spacing: 4px;
  color: rgba(245,240,232,0.18);
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════
   RESPONSIVE — desktop mínimo
════════════════════════════════════════════ */
@media (min-width: 600px) {
  .books-grid {
    max-width: 380px;
  }
  .book-title {
    font-size: 28px;
  }
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     FONDO — imagen + overlay + ruido
     ▼ CAMBIA la URL en .bg-layer (en el CSS)
════════════════════════════════════════ -->
<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="bg-noise"></div>

<!-- ════════════════════════════════════════
     CONTENIDO PRINCIPAL
════════════════════════════════════════ -->
<div class="page-wrapper">

  <!-- HEADER -->
  <header class="header">
    <span class="header-eyebrow">Un capítulo a la vez</span>

    <h1 class="header-title">
      Nuestra Historia<br>
      <span class="heart">♡</span>
    </h1>

    <div class="header-divider">
      <span>Vol. I</span>
    </div>

    <p class="header-sub">Cada libro, un pedazo de nosotros</p>
  </header>

  <!-- ──────────────────────────────────────
       LIBROS
  ─────────────────────────────────────── -->
  <div class="books-grid">

    <!-- ══════════════════════════════════
         LIBRO 1 — ACTIVO
         ▼ CAMBIA href="#" por tu link real
         ▼ CAMBIA src de la imagen de portada
    ═══════════════════════════════════════ -->
    <a href="https://mi-mujer-la-mejor.github.io/Mimujer-LAMEJOR.github.io/"
       style="text-decoration:none; display:block;"
       id="book1">

      <div class="book book-active">

        <!-- ▼ CAMBIA esta URL por la imagen de portada del libro 1 -->
        <img class="book-cover"
             src="https://i.imgur.com/GzaX8eu.jpeg"
             alt="Capítulo 1">

        <div class="book-gradient"></div>
        <div class="book-spine"></div>
        <div class="book-corner"></div>

        <div class="book-content">
          <span class="book-chapter">Capítulo 1</span>
          <h2 class="book-title">El inicio<br>de todo</h2>
          <p class="book-sub">11 · 03 · 2026</p>
        </div>

        <!-- Flecha activa -->

    <!-- ══════════════════════════════════
         LIBRO 2 — EN PROCESO
         ▼ Para activar en el futuro:
           1. Elimina la clase .book-locked
           2. Añade la clase .book-active
           3. Envuelve en <a href="TU_LINK">
           4. Cambia la imagen de portada
           5. Borra el div .book-locked-overlay
    ═══════════════════════════════════════ -->
    <div class="book book-locked" id="book2">

         <a href="https://mi-mujer-la-mejor.github.io/canciones/"
   style="text-decoration:none; display:block;"
   id="book2">

  <div class="book book-active">

      <!-- ▼ CAMBIA esta URL cuando lo actives -->
      <img class="book-cover"
           src="https://i.imgur.com/xJqvXqd.png"
           alt="Capítulo 2">

      </div>
</a>

    <!-- ══════════════════════════════════

         ▼ Mismas instrucciones que el libro 2
    ═══════════════════════════════════════ -->

      <!-- ▼ CAMBIA esta URL cuando lo actives -->
      <img class="book-cover"
           src=""
           alt="Capítulo 3">

      <div class="book-gradient"></div>
      <div class="book-spine"></div>
      <div class="book-corner"></div>

      <div class="book-content">

      </div>

      <!-- Overlay bloqueado — elimina esto cuando lo actives -->

        <span class="lock-icon">🔒</span>
        <span class="lock-label">En proceso</span>
      </div>

    </div>

  </div><!-- /books-grid -->

  <!-- FOOTER -->
  <footer class="page-footer">
    <span class="footer-sym">♡</span>
    <p class="footer-note">Melannie · 2026</p>
  </footer>

</div><!-- /page-wrapper -->

<!-- ════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════ -->
<script>
  /* ── Animación de entrada para cada libro al hacer scroll ── */
  const books = document.querySelectorAll('.book');

  const bookObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        /* Stagger: cada libro entra con un pequeño retraso */
        const delay = entry.target.dataset.delay || 0;
        setTimeout(() => {
          entry.target.classList.add('visible');
        }, delay);
        bookObserver.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.12,
    rootMargin: '0px 0px -40px 0px'
  });

  books.forEach((book, index) => {
    /* Asigna el delay según el orden */
    book.dataset.delay = index * 140;
    bookObserver.observe(book);
  });

  /* ── Prevenir que los libros bloqueados hagan algo al tocar ── */
  document.querySelectorAll('.book-locked').forEach(book => {
    book.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();

      /* Pequeño shake visual para indicar que está bloqueado */
      book.style.animation = 'none';
      book.style.transform = 'translateX(-4px)';
      setTimeout(() => { book.style.transform = 'translateX(4px)'; }, 80);
      setTimeout(() => { book.style.transform = 'translateX(-2px)'; }, 160);
      setTimeout(() => { book.style.transform = 'translateX(0)'; }, 240);
    });
  });
</script>
